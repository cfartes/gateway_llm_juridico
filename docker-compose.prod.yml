version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: Nexus Gateway LLM Shield
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CORS_ORIGINS: https://${APP_DOMAIN}
      ALLOWED_HOSTS: ${API_DOMAIN}
      FORCE_HTTPS: "true"
      FRONTEND_BASE_URL: https://${FRONTEND_BASE_URL}
      REFRESH_COOKIE_SECURE: "true"
      REFRESH_COOKIE_SAMESITE: lax
      REFRESH_COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      WEBHOOK_CALLBACK_ALLOW_HTTP_LOCALHOST: "false"
      WEBHOOK_CALLBACK_BLOCK_PRIVATE_NETWORKS: "true"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
      SMTP_USE_SSL: ${SMTP_USE_SSL}
      SUPERADMIN_AUTO_BOOTSTRAP: ${SUPERADMIN_AUTO_BOOTSTRAP}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK}
      - traefik.http.routers.nexus-api.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.nexus-api.entrypoints=websecure
      - traefik.http.routers.nexus-api.tls=true
      - traefik.http.routers.nexus-api.tls.certresolver=${TRAEFIK_CERTRESOLVER}
      - traefik.http.services.nexus-api.loadbalancer.server.port=8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)\""]
      interval: 20s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO -Q scan_light,scan_standard,scan_heavy,celery
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - internal

  worker-beat:
    build:
      context: ./backend
    restart: unless-stopped
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=INFO
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://${API_DOMAIN}/api/v1
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK}
      - traefik.http.routers.nexus-app.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.nexus-app.entrypoints=websecure
      - traefik.http.routers.nexus-app.tls=true
      - traefik.http.routers.nexus-app.tls.certresolver=${TRAEFIK_CERTRESOLVER}
      - traefik.http.services.nexus-app.loadbalancer.server.port=3000

networks:
  internal:
    name: nexus_internal
  proxy:
    external: true
    name: ${TRAEFIK_NETWORK}

volumes:
  pg_data:
  redis_data:
