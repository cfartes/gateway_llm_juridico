apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-frontend
  template:
    metadata:
      labels:
        app: nexus-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/nexus-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: https://api.example.com/api/v1
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-frontend
spec:
  selector:
    app: nexus-frontend
  ports:
    - port: 80
      targetPort: 3000

