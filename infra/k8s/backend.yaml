apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-backend
  template:
    metadata:
      labels:
        app: nexus-backend
    spec:
      containers:
        - name: api
          image: your-registry/nexus-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: database_url
            - name: REDIS_URL
              value: redis://nexus-redis:6379/0
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-backend
spec:
  selector:
    app: nexus-backend
  ports:
    - port: 80
      targetPort: 8000

