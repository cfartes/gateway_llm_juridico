version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nexus_llm_shield
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/nexus_llm_shield
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CORS_ORIGINS: http://localhost:3000,http://localhost:3010
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO -Q scan_light,scan_standard,scan_heavy,celery
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/nexus_llm_shield
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app

  worker-beat:
    build:
      context: ./backend
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/nexus_llm_shield
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pg_data:

